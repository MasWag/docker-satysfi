name: build
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    strategy:
      matrix:
        context: [., slim, opam-slim, branch]
        platform:
          - linux/amd64
          # - linux/arm64
        include:
          - context: .
            platform: linux/amd64
            tag: latest
          - context: slim
            platform: linux/amd64
            tag: slim
          - context: opam-slim
            platform: linux/amd64
            tag: opam-slim
          - context: branch
            platform: linux/amd64
            tag: nightly
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ matrix.context }}-${{ matrix.platform }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.context }}-${{ matrix.platform }}-
      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: args
        run: |
          echo "date=$(date --iso-8601=seconds)" >> $GITHUB_OUTPUT
          echo "revision=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          push: false
          load: true
          tags: ghcr.io/maswag/satysfi:ci
          build-args: |
            BUILD_DATE=${{ steps.args.outputs.date }}
            VERSION=ci
            REVISION=${{ steps.args.outputs.revision }}
            # only 'branch' context
            BRANCH=master
            IMAGE_TAG=ci
          platforms: ${{ matrix.platform }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache
      # the size represents uncompressed. see https://gist.github.com/MichaelSimons/fb588539dcefd9b5fdf45ba04c302db6
      - run: docker images
      # run tests
      - run: docker run --rm ghcr.io/maswag/satysfi:ci satysfi --help
      - run: docker run --rm ghcr.io/maswag/satysfi:ci satyrographos help
      - run: docker run --rm -v $(pwd)/tests:/satysfi ghcr.io/maswag/satysfi:ci satysfi minimum.saty
      - run: docker run --rm -v $(pwd)/tests:/satysfi ghcr.io/maswag/satysfi:ci satysfi with-dist.saty
      - run: docker run --rm -v $(pwd)/tests:/satysfi ghcr.io/maswag/satysfi:ci sh -c "opam install satysfi-base --ignore-constraints-on=satysfi && satyrographos install && satysfi with-base.saty"
        if: ${{ matrix.context == '.' || matrix.context == 'opam-slim' }}
      # push to GHCR on merge to main
      - name: Push to GHCR
        if: github.event_name == 'push'
        run: |
          docker tag ghcr.io/maswag/satysfi:ci ghcr.io/maswag/satysfi:${{ matrix.tag }}
          docker push ghcr.io/maswag/satysfi:${{ matrix.tag }}

  # build v0.1.0 satysfi
  build-saphe:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    strategy:
      matrix:
        branch:
          # Change if this branch is deleted
          - dev-0-1-0-separate-saphe-from-satysfi
        platform:
          - linux/amd64
          # - linux/arm64
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-branch-${{ matrix.branch }}-${{ matrix.platform }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-branch-${{ matrix.branch }}-${{ matrix.platform }}-
      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: args
        run: |
          echo "date=$(date --iso-8601=seconds)" >> $GITHUB_OUTPUT
          echo "revision=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - uses: docker/build-push-action@v6
        with:
          context: branch-saphe
          file: branch-saphe/Dockerfile
          push: false
          load: true
          tags: ghcr.io/maswag/satysfi:ci
          build-args: |
            BUILD_DATE=${{ steps.args.outputs.date }}
            VERSION=ci
            REVISION=${{ steps.args.outputs.revision }}
            # only 'branch-saphe' context
            BRANCH=${{ matrix.branch }}
            IMAGE_TAG=ci
          platforms: ${{ matrix.platform }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache
      # the size represents uncompressed. see https://gist.github.com/MichaelSimons/fb588539dcefd9b5fdf45ba04c302db6
      - run: docker images
      # run tests
      - run: docker run --rm ghcr.io/maswag/satysfi:ci satysfi --help
      - run: docker run --rm ghcr.io/maswag/satysfi:ci saphe --help
      - run: git clone --branch ${{ matrix.branch }} https://github.com/gfngfn/SATySFi.git
      - run: docker run --rm -v $(pwd)/SATySFi/demo:/satysfi ghcr.io/maswag/satysfi:ci sh -c "saphe solve demo.saty && saphe build demo.saty"
      # push to GHCR on merge to main
      - name: Push to GHCR
        if: github.event_name == 'push'
        run: |
          docker tag ghcr.io/maswag/satysfi:ci ghcr.io/maswag/satysfi:branch-${{ matrix.branch }}
          docker push ghcr.io/maswag/satysfi:branch-${{ matrix.branch }}
