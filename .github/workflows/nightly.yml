name: nightly
on:
  schedule:
    - cron: 0 0 * * *
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    strategy:
      matrix:
        platform:
          - linux/amd64
          # - linux/arm64
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: args
        run: |
          echo "date=$(date --iso-8601=seconds)" >> $GITHUB_OUTPUT
          echo "version=$(date --iso-8601=date)-nightly" >> $GITHUB_OUTPUT
          echo "revision=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - uses: docker/build-push-action@v6
        with:
          context: branch
          file: branch/Dockerfile
          push: false
          load: true
          tags: ghcr.io/maswag/satysfi:nightly
          build-args: |
            BUILD_DATE=${{ steps.args.outputs.date }}
            VERSION=${{ steps.args.outputs.version }}
            REVISION=${{ steps.args.outputs.revision }}
            BRANCH=master
            IMAGE_TAG=nightly
          platforms: ${{ matrix.platform }}
      # run tests
      - run: docker run --rm ghcr.io/maswag/satysfi:nightly satysfi --help
      - run: docker run --rm ghcr.io/maswag/satysfi:nightly satyrographos help
      - run: docker run --rm -v $(pwd)/tests:/satysfi ghcr.io/maswag/satysfi:nightly satysfi minimum.saty
      - run: docker run --rm -v $(pwd)/tests:/satysfi ghcr.io/maswag/satysfi:nightly satysfi with-dist.saty
      - run: git clone https://github.com/gfngfn/SATySFi.git
      - run: docker run --rm -v $(pwd)/SATySFi/demo:/satysfi ghcr.io/maswag/satysfi:nightly satysfi demo.saty
      # push
      - run: docker push ghcr.io/maswag/satysfi:nightly
